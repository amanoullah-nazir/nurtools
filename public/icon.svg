<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#059669"/>
  
  <!-- Compass Icon (matching all other icons) -->
  <g transform="translate(256, 256)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="144" fill="white" opacity="0.2"/>
    <circle cx="0" cy="0" r="128" stroke="white" stroke-width="12" fill="none"/>
    
    <!-- Compass needle -->
    <g>
      <!-- North pointer -->
      <path d="M 0,-96 L -24,40 L 0,24 L 24,40 Z" fill="white"/>
      <!-- South pointer -->
      <path d="M 0,96 L -24,-40 L 0,-24 L 24,-40 Z" fill="white" opacity="0.6"/>
    </g>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="16" fill="white"/>
  </g>
</svg>
