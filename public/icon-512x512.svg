<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#059669"/>
  
  <!-- Compass Icon (matching menu bar design) -->
  <g transform="translate(256, 256)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="145" fill="white" opacity="0.2"/>
    <circle cx="0" cy="0" r="130" stroke="white" stroke-width="8" fill="none"/>
    
    <!-- Compass needle -->
    <g>
      <!-- North pointer -->
      <path d="M 0,-95 L -22,40 L 0,28 L 22,40 Z" fill="white"/>
      <!-- South pointer -->
      <path d="M 0,95 L -22,-40 L 0,-28 L 22,-40 Z" fill="white" opacity="0.6"/>
    </g>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="14" fill="white"/>
  </g>
</svg>
