<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="#059669"/>
  
  <!-- Compass Icon (matching menu bar design) -->
  <g transform="translate(96, 96)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="55" fill="white" opacity="0.2"/>
    <circle cx="0" cy="0" r="48" stroke="white" stroke-width="3" fill="none"/>
    
    <!-- Compass needle -->
    <g>
      <!-- North pointer -->
      <path d="M 0,-35 L -8,15 L 0,10 L 8,15 Z" fill="white"/>
      <!-- South pointer -->
      <path d="M 0,35 L -8,-15 L 0,-10 L 8,-15 Z" fill="white" opacity="0.6"/>
    </g>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="white"/>
  </g>
</svg>
