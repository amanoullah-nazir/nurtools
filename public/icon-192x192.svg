<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#059669"/>
  
  <!-- Compass circle -->
  <circle cx="96" cy="96" r="60" fill="white" fill-opacity="0.2"/>
  <circle cx="96" cy="96" r="50" fill="white" fill-opacity="0.3"/>
  
  <!-- Compass needle (pointing to Qibla) -->
  <g transform="translate(96, 96)">
    <!-- North pointer (red) -->
    <path d="M 0,-40 L -8,0 L 8,0 Z" fill="#EF4444"/>
    <!-- South pointer (white) -->
    <path d="M 0,40 L -8,0 L 8,0 Z" fill="white"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="white"/>
    <circle cx="0" cy="0" r="4" fill="#059669"/>
  </g>
  
  <!-- Cardinal directions -->
  <text x="96" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">N</text>
  <text x="162" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">E</text>
  <text x="96" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">S</text>
  <text x="30" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">W</text>
</svg>
